version: 2

models:

  - name: rpt_executive_summary
    description: Executive KPI summary table for business reporting and dashboard consumption.

    columns:

      - name: total_revenue
        description: Total revenue generated across all orders.

      - name: total_orders
        description: Total distinct orders.

      - name: products_sold
        description: Total products sold.

      - name: avg_order_value
        description: Average order value across all orders.

      - name: revenue_per_customer
        description: Average revenue generated per customer.